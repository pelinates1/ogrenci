<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>OBS Giriş Modülleri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f4f7f6; min-height: 100vh; }
        .text-pure-red { color: #ff0000 !important; }
        .btn-pure-red { 
            background-color: #ff0000; 
            color: white; 
            border: 2px solid #ff0000; 
        }
        .btn-pure-red:hover { 
            background-color: #cc0000; 
            border-color: #cc0000;
            color: white; 
        }
        .btn-pure-red.disabled, .btn-pure-red:disabled {
            background-color: #ff0000 !important;
            border-color: #ff0000 !important;
            opacity: 0.5;
            color: white !important;
        }
    </style>
</h:head>
<h:body class="d-flex align-items-center">
    <div class="container py-5">
        <div class="row text-center" style="position: absolute; top: 15vh; width: 100%; left: 0;">
            <div class="col-12">
                <h1 class="text-dark fw-bold">Öğrenci Otomasyon Sistemi</h1>
            </div>
        </div>
        <div class="row justify-content-center g-4">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center py-5">
                        <i class="bi bi-shield-lock-fill text-pure-red" style="font-size: 3rem;"></i>
                        <h4 class="mt-3">Yönetici Girişi</h4>
                        <a href="yonetici-giris.xhtml" class="btn btn-pure-red mt-3 w-75">Giriş Ekranına Git</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center py-5">
                        <i class="bi bi-person-video3 text-primary" style="font-size: 3rem;"></i>
                        <h4 class="mt-3">Öğretmen Girişi</h4>
                        <a href="ogretmen-giris.xhtml" class="btn btn-primary mt-3 w-75">Giriş Ekranına Git</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center py-5">
                        <i class="bi bi-mortarboard-fill text-success" style="font-size: 3rem;"></i>
                        <h4 class="mt-3">Öğrenci Girişi</h4>
                        <a href="ogrenci-giris.xhtml" class="btn btn-success mt-3 w-75">Giriş Ekranına Git</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</h:body>
</html>
