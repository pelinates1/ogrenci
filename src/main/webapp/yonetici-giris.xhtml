<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="jakarta.faces.passthrough">
<h:head>
    <title>Yönetici Girişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 500px; padding: 40px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); background-color: white; }
        .back-arrow {
            position: absolute; top: 20px; left: 20px;
            color: #ff0000; text-decoration: none;
            width: 40px; height: 40px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 50%; border: 2px solid #ff0000;
            transition: all 0.3s ease; background-color: transparent;
        }
        .back-arrow:hover {
            background-color: #ff0000; color: white;
            border: 2px solid white; box-shadow: 0 4px 10px rgba(255, 0, 0, 0.4);
        }
        .text-pure-red { color: #ff0000 !important; }
        .btn-pure-red { 
            background-color: #ff0000; 
            color: white; 
            border: 2px solid #ff0000; 
        }
        .btn-pure-red:hover { 
            background-color: #cc0000; 
            border-color: #cc0000;
            color: white; 
        }
        .btn-pure-red.disabled, .btn-pure-red:disabled {
            background-color: #ff0000 !important;
            border-color: #ff0000 !important;
            opacity: 0.5;
            color: white !important;
        }
    </style>
</h:head>
<h:body>
    <a href="login.xhtml" class="back-arrow" title="Geri Dön">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
    </a>
    <div class="login-card">
        <h2 class="text-center mb-4 text-pure-red fw-bold">Yönetici Girişi</h2>
        <h:form id="adminLoginForm">
            <h:messages globalOnly="true" styleClass="alert alert-danger fs-5" style="list-style-type: none; padding: 10px; border-radius: 5px;"/>
            <div class="mb-4">
                <label class="form-label fs-5 fw-semibold">Kullanıcı Adı</label>
                <h:inputText id="username" value="#{loginBean.user.okulNo}" required="true" requiredMessage="Kullanıcı adı boş bırakılamaz!" styleClass="form-control form-control-lg"/>
            </div>
            <div class="mb-4">
                <label class="form-label fs-5 fw-semibold">Şifre</label>
                <h:inputSecret id="password" value="#{loginBean.user.sifre}" required="true" requiredMessage="Şifre boş bırakılamaz!" styleClass="form-control form-control-lg"/>
            </div>
            <div class="d-grid gap-2 mt-2">
                <h:commandButton id="loginBtn" value="Giriş Yap" action="#{loginBean.loginAdmin}" styleClass="btn btn-pure-red btn-lg disabled" />
            </div>
        </h:form>
    </div>
    <script>
        (function () {
            function byId(id) { return document.getElementById(id); }
            function toggle() {
                var u = byId('adminLoginForm:username');
                var p = byId('adminLoginForm:password');
                var b = byId('adminLoginForm:loginBtn');
                if (!u || !p || !b) return;
                var ok = u.value.trim().length > 0 &amp;&amp; p.value.trim().length > 0;
                if (ok) {
                    b.classList.remove('disabled');
                    b.removeAttribute('disabled');
                } else {
                    b.classList.add('disabled');
                    b.setAttribute('disabled', 'disabled');
                }
            }
            document.addEventListener('input', toggle, true);
            window.addEventListener('load', toggle);
        })();
    </script>
</h:body>
</html>
