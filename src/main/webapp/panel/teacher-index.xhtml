<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Öğretmen Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
</h:head>
<h:body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-person-video3"></i> Öğretmen Paneli</a>
            <div class="d-flex text-white align-items-center">
                <span class="me-4">Hoş Geldiniz, <b>#{user.ad} #{user.soyad}</b></span>
                <a href="../login.xhtml" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Çıkış Yap</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row text-center mb-4">
            <div class="col-12">
                <h2 class="fw-light">Eğitmen İşlemleri</h2>
                <p class="text-muted">Buradan verdiğiniz dersleri yönetebilir ve öğrencilerinize not girebilirsiniz.</p>
            </div>
        </div>

        <div class="row text-center justify-content-center">
            <!-- Derslerim Kartı -->
            <div class="col-md-5 mb-4">
                <div class="card shadow border-0 h-100" style="border-top: 5px solid #198754 !important;">
                    <div class="card-body py-5">
                        <i class="bi bi-book text-success mb-3" style="font-size: 4.5rem; display: block;"></i>
                        <h3 class="card-title fw-bold">Derslerim</h3>
                        <a href="#" class="btn btn-success btn-lg mt-3 w-75 rounded-pill shadow-sm">Görüntüle</a>
                    </div>
                </div>
            </div>

            <!-- Not Girişi Kartı -->
            <div class="col-md-5 mb-4">
                <div class="card shadow border-0 h-100" style="border-top: 5px solid #ffc107 !important;">
                    <div class="card-body py-5">
                        <i class="bi bi-journal-text text-warning mb-3" style="font-size: 4.5rem; display: block;"></i>
                        <h3 class="card-title fw-bold">Not Girişi</h3>
                        <a href="#" class="btn btn-warning text-dark btn-lg mt-3 w-75 rounded-pill shadow-sm">Not Gir</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
