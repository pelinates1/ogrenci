<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Ders Kayıt İşlemleri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
</h:head>
<h:body class="bg-light">

    <!-- Üst Menü -->
    <nav class="navbar navbar-dark bg-info mb-4 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand text-dark mb-0 h1"><i class="bi bi-link-45deg"></i> Ders Kayıt (Atama) Modülü</span>
            <a href="index.xhtml" class="btn btn-outline-dark btn-sm"><i class="bi bi-arrow-left"></i> Panele Dön</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <h:messages globalOnly="true" infoClass="alert alert-success" errorClass="alert alert-danger" style="list-style-type:none; padding: 15px; border-radius: 5px;"/>

                <div class="card shadow-lg border-0 border-top border-info border-5">
                    <div class="card-body p-5">
                        <h4 class="card-title text-center mb-4"><i class="bi bi-person-lines-fill"></i> Öğrenciyi Derse Kaydet</h4>

                        <h:form id="kayitForm">

                            <!-- 1. Ders Seçimi -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">1. Dersi Seçin</label>
                                <h:selectOneMenu value="#{enrollmentBean.seciliDersId}" styleClass="form-select form-select-lg">
                                    <f:selectItem itemLabel="-- Lütfen Bir Ders Seçin --" itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{enrollmentBean.tumDersler}" var="ders" itemValue="#{ders.id}" itemLabel="#{ders.dersKodu} - #{ders.dersAdi} (#{ders.ogretmen.ad})" />
                                </h:selectOneMenu>
                            </div>

                            <!-- 2. Öğrenci Seçimi -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">2. Öğrenciyi Seçin</label>
                                <h:selectOneMenu value="#{enrollmentBean.seciliOgrenciId}" styleClass="form-select form-select-lg">
                                    <f:selectItem itemLabel="-- Lütfen Bir Öğrenci Seçin --" itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{enrollmentBean.tumOgrenciler}" var="ogr" itemValue="#{ogr.id}" itemLabel="#{ogr.okulNo} | #{ogr.ad} #{ogr.soyad}" />
                                </h:selectOneMenu>
                            </div>

                            <div class="d-grid mt-5">
                                <h:commandButton value="Öğrenciyi Derse Kaydet" action="#{enrollmentBean.kayitYap}" styleClass="btn btn-info btn-lg text-dark fw-bold shadow-sm" />
                            </div>
                        </h:form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
