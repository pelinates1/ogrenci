<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>Yönetici Girişi</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 50px; border-radius: 20px; width: 350px; text-align: center; border: 2px solid #ef4444; }
        h2 { margin-bottom: 30px; }
        .lbl { text-align: left; display: block; margin-bottom: 6px; color: #94a3b8; font-size: 13px; }
        .ibox { width: 100%; height: 45px; border-radius: 8px; border: 2px solid #475569; background: #0f172a; color: white; padding: 0 12px; font-size: 16px; box-sizing: border-box; display: block; margin-bottom: 20px; }
        .ibox:focus { border-color: #ef4444; outline: none; }
        .btn { width: 100%; padding: 14px; background: #ef4444; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn:hover { background: #dc2626; }
        .back { position: fixed; top: 25px; left: 25px; color: #94a3b8; text-decoration: none; font-size: 26px; }
    </style>
</h:head>
<h:body>
    <a href="login.xhtml" class="back">←</a>
    <div class="card">
        <h2>Yönetici Girişi</h2>
        <h:form id="loginForm">
            <h:messages globalOnly="true" style="color: #ef4444; list-style-type: none; margin-bottom: 20px;"/>
            <label class="lbl">Kullanıcı Adı</label>
            <h:inputText id="user" value="#{loginBean.user.okulNo}" styleClass="ibox" />
            <label class="lbl">Şifre</label>
            <h:inputSecret id="pass" value="#{loginBean.user.sifre}" styleClass="ibox" />
            <h:commandButton value="Giriş Yap" action="#{loginBean.loginAdmin}" styleClass="btn" />
        </h:form>
    </div>
</h:body>
</html>
