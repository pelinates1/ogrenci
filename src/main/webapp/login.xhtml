<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>OBS Giriş</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap');
        body { background: #0f172a; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .container { text-align: center; max-width: 1100px; width: 100%; padding: 40px; }
        .main-title { font-size: 3.5rem; font-weight: 700; margin-bottom: 15px; letter-spacing: -2px; color: white; }
        .subtitle { color: #94a3b8; font-size: 1.2rem; margin-bottom: 60px; }
        .row { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .login-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 45px 30px; width: 280px; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .login-card:hover { background: rgba(255, 255, 255, 0.07); transform: translateY(-10px); }
        .icon { font-size: 4rem; margin-bottom: 25px; }
        .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
        .btn-custom { width: 100%; padding: 12px; border-radius: 12px; font-weight: 600; text-decoration: none; text-align: center; margin-top: 20px; color: white; }
        .btn-admin { background: #ef4444; }
        .btn-teacher { background: #0284c7; }
        .btn-student { background: #16a34a; }
    </style>
</h:head>
<h:body>
    <div class="container">
        <h1 class="main-title">Öğrenci Otomasyon Sistemi</h1>
        <p class="subtitle">Giriş yapmak istediğiniz paneli seçin.</p>
        <div class="row">
            <a href="yonetici-giris.xhtml" class="login-card">
                <div class="icon">🛡️</div>
                <div class="card-title">Yönetici</div>
                <div class="btn-custom btn-admin">Giriş</div>
            </a>
            <a href="ogretmen-giris.xhtml" class="login-card">
                <div class="icon">👨‍🏫</div>
                <div class="card-title">Öğretmen</div>
                <div class="btn-custom btn-teacher">Giriş</div>
            </a>
            <a href="ogrenci-giris.xhtml" class="login-card">
                <div class="icon">🎓</div>
                <div class="card-title">Öğrenci</div>
                <div class="btn-custom btn-student">Giriş</div>
            </a>
        </div>
    </div>
</h:body>
</html>
