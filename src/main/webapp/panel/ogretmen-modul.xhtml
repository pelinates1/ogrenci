<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="jakarta.faces.passthrough"> <!-- HTML5 özellikleri (placeholder vs) için eklendi -->
<h:head>
    <title>Öğretmen Modülü</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
</h:head>
<h:body class="bg-light">

    <!-- Üst Menü -->
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-person-video3 text-primary"></i> Öğretmen Yönetim Modülü</span>
            <a href="index.xhtml" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> Panele Dön</a>
        </div>
    </nav>

    <div class="container">

        <!-- Hata ve Başarı Mesajları (Sadece uyarılar için tasarlandı) -->
        <h:messages globalOnly="true" infoClass="alert alert-success" errorClass="alert alert-danger" style="list-style-type:none; padding: 15px; border-radius: 5px;"/>

        <div class="row">

            <!-- SOL TARAF: EKLE/GÜNCELLE FORMU -->
            <div class="col-md-4">
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0"><i class="bi bi-person-plus-fill"></i> Öğretmen Bilgileri</h5>
                    </div>
                    <div class="card-body bg-white">
                        <h:form id="ogretmenForm">
                            <!-- Güncelleme işlemi için kullanıcının ID'sini gizli tutuyoruz -->
                            <h:inputHidden value="#{teacherBean.seciliKullanici.id}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold">Okul No (Kullanıcı Adı)</label>
                                <h:inputText value="#{teacherBean.seciliKullanici.okulNo}" required="true" requiredMessage="Okul no zorunlu!" styleClass="form-control" p:placeholder="Örn: 1001" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Adı</label>
                                <h:inputText value="#{teacherBean.seciliKullanici.ad}" required="true" requiredMessage="Ad zorunlu!" styleClass="form-control" p:placeholder="Öğretmen Adı" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Soyadı</label>
                                <h:inputText value="#{teacherBean.seciliKullanici.soyad}" required="true" requiredMessage="Soyad zorunlu!" styleClass="form-control" p:placeholder="Öğretmen Soyadı" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Şifre</label>
                                <h:inputSecret value="#{teacherBean.seciliKullanici.sifre}" required="true" requiredMessage="Şifre zorunlu!" styleClass="form-control" p:placeholder="******" />
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <!-- Kaydet Butonu -->
                                <h:commandButton value="Kaydet / Güncelle" action="#{teacherBean.kaydet}" styleClass="btn btn-primary fw-bold" />

                                <!-- Temizle Butonu -->
                                <h:commandButton value="Formu Temizle" action="#{teacherBean.temizle}" styleClass="btn btn-outline-secondary" immediate="true">
                                    <f:ajax render="@form" /> <!-- Sayfayı yenilemeden formu anında temizler -->
                                </h:commandButton>
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>

            <!-- SAĞ TARAF: ÖĞRETMEN LİSTESİ (TABLO) -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0"><i class="bi bi-list-task"></i> Kayıtlı Öğretmenler Listesi</h5>
                        <span class="badge bg-primary rounded-pill">#{teacherBean.ogretmenListesi.size()} Kişi</span>
                    </div>
                    <div class="card-body bg-white p-0">
                        <h:form id="listeForm">
                            <!-- Bootstrap Tablosu -->
                            <h:dataTable value="#{teacherBean.ogretmenListesi}" var="ogr" styleClass="table table-striped table-hover align-middle mb-0">

                                <h:column>
                                    <f:facet name="header">Okul No</f:facet>
                                    <span class="fw-bold text-secondary">#{ogr.okulNo}</span>
                                </h:column>

                                <h:column>
                                    <f:facet name="header">Adı</f:facet>
                                    #{ogr.ad}
                                </h:column>

                                <h:column>
                                    <f:facet name="header">Soyadı</f:facet>
                                    #{ogr.soyad}
                                </h:column>

                                <!-- İŞLEM BUTONLARI (GÜNCELLE & SİL) -->
                                <h:column>
                                    <f:facet name="header"><div class="text-center">İşlemler</div></f:facet>
                                    <div class="text-center">

                                        <!-- Seç (Forma Doldur) Butonu -->
                                        <h:commandLink action="#{teacherBean.formaGetir(ogr)}" styleClass="btn btn-warning btn-sm me-2" title="Bilgileri Düzenle">
                                            <i class="bi bi-pencil-square"></i> Seç
                                        </h:commandLink>

                                        <!-- Sil Butonu -->
                                        <h:commandLink action="#{teacherBean.sil(ogr)}" styleClass="btn btn-danger btn-sm" onclick="return confirm('Dikkat: Bu öğretmeni silmek istediğinize emin misiniz?');" title="Sistemden Sil">
                                            <i class="bi bi-trash-fill"></i> Sil
                                        </h:commandLink>

                                    </div>
                                </h:column>
                            </h:dataTable>

                            <!-- Eğer liste boşsa ekranda bilgi mesajı ver -->
                            <h:panelGroup rendered="#{empty teacherBean.ogretmenListesi}">
                                <div class="text-center text-muted p-4">
                                    <i class="bi bi-info-circle fs-4 d-block mb-2"></i>
                                    Sistemde kayıtlı hiçbir öğretmen bulunmamaktadır.
                                </div>
                            </h:panelGroup>

                        </h:form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
